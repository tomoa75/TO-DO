<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="icon.png" />

    <link rel="apple-touch-icon" href="icon.png" />

    <meta name="apple-mobile-web-app-title" content="Moj To-Do" />
    <title>TODO</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="login">
      <h1>Please choose your profile or create new!</h1>
      <label for="profile">Choose profile:</label>

      <select id="profile" name="profile">
        <!-- OVDJE ĆE SE DODAVATI accounti IZ SUPABASE -->
      </select>
      <button id="login-button" type="button">Login</button><br /><br />
      <label for="new-profile">Create new profile:</label>
      <input id="new-profile" placeholder="New profile name" type="text" />
      <div id="new-profile-container"></div>
      <button id="create-profile-button" type="button">Create Profile</button
      ><br /><br />
      <label for="search-profile">Search profile:</label>
      <input id="search-profile" placeholder="Search profile" type="text" />
      <button id="search-profile-button" type="button">Search</button>
    </section>

    <main>
      <h2>
        My TODO List-<span id="naslov"></span>
        <select id="izbor">
          <!-- OVDJE ĆE SE DODAVATI mikroPROFILI IZ SUPABASE -->
        </select>
      </h2>
      <div class="kontejner-za-unos">
        <input class="unos" placeholder="Dodaj zadatak" type="text" />
        <button class="gumb-dodaj" type="button">Dodaj</button>
      </div>
      <ul class="lista"></ul>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="script4.js"></script>
    <script src="script3.js"></script>
    <script src="./Sortable.min.js"></script>
  </body>
</html>
